<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고세연의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 48px 40px; max-width: 520px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(99,102,241,0.12); }
    .avatar { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 1.8rem; color: #4f46e5; margin-bottom: 8px; }
    .subtitle { font-size: 1rem; color: #888; margin-bottom: 24px; }
    p { font-size: 1rem; line-height: 1.7; color: #555; margin-bottom: 32px; }
    .badge { display: inline-block; background: #ede9fe; color: #4f46e5; border-radius: 20px; padding: 6px 16px; font-size: 0.85rem; margin: 4px; }
    .footer { margin-top: 32px; font-size: 0.8rem; color: #bbb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요, 고세연입니다!</h1>
    <p class="subtitle">바이브코딩을 배우고 있어요</p>
    <p>코딩의 세계에 첫 발을 내디뎠습니다.<br>작은 시작이 큰 변화를 만든다고 믿어요.</p>
    <div>
      <span class="badge">🌱 배우는 중</span>
      <span class="badge">💻 HTML/CSS</span>
      <span class="badge">🚀 GitHub</span>
    </div>
    <div class="footer">나의 첫 번째 웹사이트 🎉</div>
  </div>
</body>
</html>
